name: Update Mod Stats
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Data
        env:
          CF_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Clears that deprecation warning
        run: |
          node -e "
          const fs = require('fs');
          const slugs = ['hydrogenfps', 'never-alone', 'weyes', 'dv', 'the-shadow-stalker-horror'];
          const apiKey = process.env.CF_API_KEY;
          
          async function update() {
            const results = [];
            for (const slug of slugs) {
              const res = await fetch('https://curseforge.com' + slug, {
                headers: { 'x-api-key': apiKey, 'Accept': 'application/json' }
              });
              const json = await res.json();
              if (json.data && json.data[0]) {
                results.push({ name: json.data[0].name, downloads: json.data[0].downloadCount });
              }
            }
            fs.writeFileSync('stats.json', JSON.stringify(results, null, 2));
          }
          update();
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add stats.json
          git commit -m "Automated stats update" || exit 0
          git push
